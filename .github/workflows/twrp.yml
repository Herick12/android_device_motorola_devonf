name: Build TWRP Devonf

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Init repo
        run: |
          mkdir twrp
          cd twrp
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --git-lfs

      - name: Add manifest
        run: |
          mkdir -p twrp/.repo/local_manifests
          cat > twrp/.repo/local_manifests/roomservice.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="Herick12/android_device_motorola_devonf" path="device/motorola/devonf" remote="github" revision="main" />
          </manifest>
          EOF

      - name: Sync
        run: |
          cd twrp
          repo sync -c --force-sync --no-clone-bundle --no-tags -j$(nproc)

      - name: Build recovery
        run: |
          cd twrp
          source build/envsetup.sh
          
          # Configurações de ignorar erros comuns de build
          export ALLOW_MISSING_DEPENDENCIES=true
          export SOONG_ALLOW_MISSING_DEPENDENCIES=true
          export BUILD_BROKEN_MISSING_REQUIRED_MODULES=true
          export BUILD_BROKEN_DUP_RULES=true
          export BUILD_BROKEN_VTS_TESTS=true
          export SKIP_ABI_CHECKS=true
          
          lunch omni_devonf-eng
          mka recoveryimage -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: twrp-devonf
          path: twrp/out/target/product/devonf/*.img
          
