name: Build TWRP Devonf Fixed

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo docker image prune -af || true
          sudo apt clean
          df -h

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y \
          git curl zip unzip ccache automake lzop \
          bison gperf build-essential \
          zlib1g-dev gcc-multilib g++-multilib \
          libc6-dev-i386 \
          x11proto-dev libx11-dev \
          libgl1-mesa-dev libxml2-utils xsltproc \
          openjdk-11-jdk python3 rsync \
          libncurses-dev bc flex libssl-dev

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Init repo
        run: |
          mkdir twrp
          cd twrp

          repo init \
          -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
          -b twrp-12.1 \
          --git-lfs

      - name: Add manifest
        run: |
          mkdir -p twrp/.repo/local_manifests

          cat <<EOF > twrp/.repo/local_manifests/roomservice.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project
              name="Herick12/android_device_motorola_devonf"
              path="device/motorola/devonf"
              remote="github"
              revision="main" />
          </manifest>
          EOF

      - name: Sync sources
        run: |
          cd twrp

          git config --global url."https://github.com/".insteadOf git@github.com:

          repo sync \
          -c \
          --force-sync \
          --no-clone-bundle \
          --no-tags \
          -j4

      - name: Fix device tree
        run: |
          cd twrp

          echo "=== PATCHING BOARDCONFIG ==="

          sed -i '/BOARD_MOVE_RECOVERY_RESOURCES_TO_VENDOR_BOOT/d' device/motorola/devonf/BoardConfig.mk
          sed -i '/TARGET_COPY_OUT_PRODUCT/d' device/motorola/devonf/BoardConfig.mk
          sed -i '/TARGET_COPY_OUT_SYSTEM_EXT/d' device/motorola/devonf/BoardConfig.mk
          sed -i '/BOARD_PRODUCTIMAGE_FILE_SYSTEM_TYPE/d' device/motorola/devonf/BoardConfig.mk
          sed -i '/BOARD_SYSTEM_EXTIMAGE_FILE_SYSTEM_TYPE/d' device/motorola/devonf/BoardConfig.mk
          sed -i '/TARGET_NO_RECOVERY/d' device/motorola/devonf/BoardConfig.mk
          sed -i '/TARGET_NO_KERNEL/d' device/motorola/devonf/BoardConfig.mk

          cat >> device/motorola/devonf/BoardConfig.mk <<EOF

          TARGET_NO_KERNEL := false
          TARGET_NO_RECOVERY := true

          BOARD_USES_RECOVERY_AS_BOOT := true

          TARGET_RECOVERY_FSTAB := device/motorola/devonf/recovery.fstab

          BOARD_BUILD_SYSTEM_ROOT_IMAGE := false
          BOARD_SUPPRESS_SECURE_ERASE := true
          BOARD_HAS_LARGE_FILESYSTEM := true

          TARGET_COPY_OUT_VENDOR := vendor

          BOARD_VENDORIMAGE_FILE_SYSTEM_TYPE := ext4
          BOARD_SYSTEMIMAGE_FILE_SYSTEM_TYPE := ext4

          RECOVERY_SDCARD_ON_DATA := true
          BOARD_HAS_NO_SELECT_BUTTON := true
          TARGET_USERIMAGES_USE_EXT4 := true

          TW_THEME := portrait_hdpi
          TW_EXTRA_LANGUAGES := true
          TW_USE_TOOLBOX := true
          TW_HAS_MTP := true
          TW_INCLUDE_FASTBOOTD := true
          TW_INCLUDE_CRYPTO := true
          TW_INCLUDE_NTFS := true
          TW_INCLUDE_REPACKTOOLS := true
          TW_INCLUDE_RECOVERY_FSTAB := true
          EOF

          echo "=== PATCHING DEVICE.MK ==="

          if ! grep -q "twrp" device/motorola/devonf/device.mk; then
            echo "" >> device/motorola/devonf/device.mk
            echo "PRODUCT_PACKAGES += \\" >> device/motorola/devonf/device.mk
            echo "    twrp" >> device/motorola/devonf/device.mk
          fi

      - name: Build
        run: |
          cd twrp
          source build/envsetup.sh

          export ALLOW_MISSING_DEPENDENCIES=true
          export SOONG_ALLOW_MISSING_DEPENDENCIES=true
          export BUILD_BROKEN_DUP_RULES=true
          export BUILD_BROKEN_MISSING_REQUIRED_MODULES=true

          lunch omni_devonf-eng

          make clean

          mka bootimage -j4

          echo "=== IMAGENS GERADAS ==="
          find out/target/product/devonf/ -name "*.img"

      - name: Prepare upload
        run: |
          mkdir -p upload

          find twrp/out/target/product/devonf/ \
          -name "*.img" \
          -exec cp {} upload/ \;

          echo "=== ARQUIVOS PARA UPLOAD ==="
          ls -lah upload/ || true

          if [ -z "$(ls -A upload 2>/dev/null)" ]; then
            echo "ERRO: Nenhuma imagem gerada!"
            find twrp/out/target/product/devonf/ -type f
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twrp-devonf
          path: upload/*
