name: Build TWRP G73

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y \
          git curl zip unzip ccache automake lzop \
          bison gperf build-essential \
          zlib1g-dev gcc-multilib g++-multilib \
          libc6-dev-i386 \
          x11proto-dev libx11-dev \
          libgl1-mesa-dev libxml2-utils xsltproc \
          openjdk-11-jdk python3 rsync \
          libncurses-dev

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Init source
        run: |
          mkdir twrp
          cd twrp
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --git-lfs --depth=1

      - name: Sync source
        run: |
          cd twrp
          git config --global url."https://github.com/".insteadOf git@github.com:
          repo sync -c -j4 --force-sync

      - name: Clone device tree
        run: |
          cd twrp
          git clone https://github.com/Herick12/android_device_motorola_devonf.git device/motorola/devonf

      - name: Build recovery
        run: |
          cd twrp
          source build/envsetup.sh
          lunch omni_devonf-eng
          mka recoveryimage

      - name: Upload recovery
        uses: actions/upload-artifact@v4
        with:
          name: twrp-devonf
          path: twrp/out/target/product/devonf/recovery.img
