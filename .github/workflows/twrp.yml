name: Build TWRP Devonf Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free huge disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost /usr/share/swift /usr/lib/jvm /opt/hostedtoolcache
          sudo docker system prune -af || true
          sudo apt clean && sudo swapoff -a || true

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git curl zip unzip ccache automake lzop bison gperf build-essential zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 x11proto-dev libx11-dev libgl1-mesa-dev libxml2-utils xsltproc openjdk-11-jdk python3 rsync libncurses-dev bc flex libssl-dev repo

      - name: Init and Sync
        run: |
          mkdir twrp && cd twrp
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
          mkdir -p .repo/local_manifests
          cat > .repo/local_manifests/roomservice.xml <<EOF
          <manifest>
            <project name="Herick12/android_device_motorola_devonf" path="device/motorola/devonf" remote="github" revision="main" />
          </manifest>
          EOF
          repo sync -c --force-sync --optimized-fetch --no-clone-bundle --no-tags --prune -j4

      - name: Patch BoardConfig
        run: |
          CONFIG_FILE="twrp/device/motorola/devonf/BoardConfig.mk"
          # Adição explícita do tamanho da partição e flags de Recovery-as-Boot
          cat >> "$CONFIG_FILE" <<EOF

          BOARD_BOOTIMAGE_PARTITION_SIZE := 134217728
          BOARD_USES_RECOVERY_AS_BOOT := true
          BOARD_INCLUDE_RECOVERY_DTBO := true
          TARGET_NO_RECOVERY := true
          EOF

      - name: Build TWRP
        run: |
          cd twrp
          source build/envsetup.sh
          
          # Variáveis para evitar erros comuns de compilação
          export ALLOW_MISSING_DEPENDENCIES=true
          export SOONG_ALLOW_MISSING_DEPENDENCIES=true
          
          lunch omni_devonf-eng
          
          # Comando para gerar a imagem de boot (recovery)
          mka bootimage -j4

      - name: Prepare and Upload
        run: |
          mkdir -p upload
          # Copia a imagem resultante
          cp twrp/out/target/product/devonf/boot.img upload/
          ls -lah upload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: twrp-devonf-fixed
          path: upload/*
          
