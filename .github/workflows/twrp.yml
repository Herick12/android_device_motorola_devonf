name: Build TWRP Devonf Fixed

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo docker image prune -af || true
          sudo apt clean

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y git curl zip unzip ccache automake lzop \
          bison gperf build-essential zlib1g-dev gcc-multilib g++-multilib \
          libc6-dev-i386 libx11-dev libgl1-mesa-dev libxml2-utils xsltproc \
          openjdk-11-jdk python3 rsync libncurses-dev

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Init repo
        run: |
          mkdir twrp
          cd twrp

          repo init \
            -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
            -b twrp-12.1 \
            --git-lfs

          mkdir -p .repo/local_manifests

      - name: Add local manifest
        run: |
          cd twrp

          cat <<EOF > .repo/local_manifests/roomservice.xml
<manifest>
  <project name="Herick12/android_device_motorola_devonf"
           path="device/motorola/devonf"
           remote="github"
           revision="main" />
</manifest>
EOF

      - name: Sync source
        run: |
          cd twrp
          repo sync -c --force-sync --no-clone-bundle --no-tags -j2

      - name: Build recovery
        run: |
          cd twrp

          source build/envsetup.sh

          export ALLOW_MISSING_DEPENDENCIES=true
          export TARGET_NO_KERNEL=true

          lunch omni_devonf-eng

          mka recoveryimage -j2

      - name: Upload files
        uses: actions/upload-artifact@v4
        with:
          name: twrp-devonf
          path: twrp/out/target/product/devonf/*.img
