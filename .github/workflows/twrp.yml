name: Build TWRP Devonf Final

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc unzip python3 rsync
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Init and Sync
        run: |
          mkdir twrp && cd twrp
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
          mkdir -p .repo/local_manifests
          mkdir -p device/motorola/devonf
          cat > .repo/local_manifests/roomservice.xml <<EOF
          <manifest>
            <project name="Herick12/android_device_motorola_devonf" path="device/motorola/devonf" remote="github" revision="main" />
          </manifest>
          EOF
          repo sync -c --force-sync --optimized-fetch --no-clone-bundle --no-tags --prune -j$(nproc)

      - name: Build TWRP
        run: |
          cd twrp
          source build/envsetup.sh
          
          export BOARD_BUILD_VENDOR_BOOT_IMAGE=true
          export BOARD_MOVE_RECOVERY_RESOURCES_TO_VENDOR_BOOT=true
          
          lunch omni_devonf-eng
          
          export ALLOW_MISSING_DEPENDENCIES=true
          export BUILD_BROKEN_MISSING_REQUIRED_MODULES=true
          export SOONG_ALLOW_MISSING_DEPENDENCIES=true
          
          mka clean
          mka bootimage vendorbootimage
          
          find out/target/product/devonf/ -maxdepth 1 -name "*.img"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: twrp-devonf-final
          path: |
            twrp/out/target/product/devonf/*.img
            
