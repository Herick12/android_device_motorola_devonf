name: Build TWRP Devonf Fixed

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo docker image prune -af || true
          sudo apt clean
          df -h

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y \
            git curl zip unzip ccache automake lzop \
            bison gperf build-essential \
            zlib1g-dev gcc-multilib g++-multilib \
            libc6-dev-i386 \
            x11proto-dev libx11-dev \
            libgl1-mesa-dev libxml2-utils xsltproc \
            openjdk-11-jdk python3 rsync \
            libncurses-dev flex libssl-dev bc

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Init repo
        run: |
          mkdir twrp
          cd twrp
          repo init \
            -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
            -b twrp-12.1 \
            --git-lfs

      - name: Add manifest
        run: |
          mkdir -p twrp/.repo/local_manifests
          cat <<EOF > twrp/.repo/local_manifests/roomservice.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="Herick12/android_device_motorola_devonf" path="device/motorola/devonf" remote="github" revision="main" />
          </manifest>
          EOF

      - name: Sync source
        run: |
          cd twrp
          git config --global url."https://github.com/".insteadOf git@github.com:
          repo sync -c --force-sync --no-clone-bundle --no-tags -j$(nproc)

      - name: Build TWRP
        run: |
          cd twrp
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          export SOONG_ALLOW_MISSING_DEPENDENCIES=true
          export BUILD_BROKEN_DUP_RULES=true
          export BUILD_BROKEN_MISSING_REQUIRED_MODULES=true
          export LC_ALL=C
          lunch omni_devonf-eng
          make clean
          mka bootimage vendorbootimage -j$(nproc)

      - name: Prepare upload
        run: |
          mkdir -p upload
          cp -fv twrp/out/target/product/devonf/*.img upload/ || true
          echo "=== ARQUIVOS ENCONTRADOS ==="
          ls -lah upload/
          if [ -z "$(ls -A upload)" ]; then
            echo "Nenhuma imagem foi gerada!"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-devonf
          path: upload/
          
